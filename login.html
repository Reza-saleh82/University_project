<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود - پلتفرم آموزش زبان انگلیسی</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <!-- منو (Header) -->
    <header class="header">
        <div class="navbar">
            <div class="logo">
                <h2>🌍 English Learn</h2>
            </div>
            
            <button class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>

            <nav class="nav-menu" id="navMenu">
                <ul>
                    <li><a href="index.html">صفحه اصلی</a></li>
                    <li><a href="index.html#lessons">درس‌ها</a></li>
                    <li><a href="index.html#podcasts">پادکست‌ها</a></li>
                    <li><a href="about.html">درباره ما</a></li>
                    <li><a href="login.html" class="active">ورود</a></li>
                </ul>
            </nav>

            <button class="theme-toggle" id="themeToggle" title="تعویض تم">
                🌙
            </button>
        </div>
    </header>

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-container">
            <div class="login-box">
                <h1>ورود</h1>
                <p class="login-subtitle">به پلتفرم آموزش انگلیسی خوش آمدید</p>

                <form class="login-form" onsubmit="handleLogin(event)">
                    <!-- Email Input -->
                    <div class="form-group">
                        <label for="email">آدرس ایمیل</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="ایمیل خود را وارد کنید" 
                            required
                        >
                    </div>

                    <!-- Password Input -->
                    <div class="form-group">
                        <label for="password">رمز عبور</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="رمز عبور خود را وارد کنید" 
                            required
                        >
                    </div>

                    <!-- Remember Me -->
                    <div class="form-group checkbox">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">مرا به خاطر بسپار</label>
                    </div>

                    <!-- Login Button -->
                    <button type="submit" class="btn-primary">ورود</button>
                </form>

                <!-- Links -->
                <div class="form-links">
                    <a href="#">رمز عبور خود را فراموش کردید؟</a>
                    <span>|</span>
                    <a href="#">ثبت نام</a>
                </div>
            </div>

            <!-- Login Image -->
            <div class="login-image">
                <img src="https://via.placeholder.com/400x400?text=English+Learning" alt="یادگیری">
                <h3>هر جا، هر وقت یاد بگیرید</h3>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 پلتفرم آموزش انگلیسی. تمامی حقوق محفوظ است.</p>
            <div class="social-links">
                <a href="#">فیسبوک</a>
                <a href="#">توییتر</a>
                <a href="#">اینستاگرام</a>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
